services:
  - type: web
    name: finance-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn bot:app --bind 0.0.0.0:$PORT --workers 1 --timeout 60
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: GOOGLE_SCRIPT_URL
        sync: false
